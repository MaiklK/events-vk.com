<!DOCTYPE html>
<html lang="ru" class="h-100">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Админка</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        .image-zoom {
            transition: transform 0.2s ease;
            transform-origin: top left;
        }
        .image-zoom:hover {
            transform: scale(5);
            z-index: 10;
            position: relative;
        }
        .small-image {
            width: 25px;
            height: auto;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 1rem;
        }

        .table-responsive {
            min-height: 3rem;
        }
    </style>
</head>
<body class="d-flex flex-column h-100">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <p class="navbar-brand text-white mb-0">
            <b><span class="align-middle" th:text="${authUser.getFirstName()}"></span></b>
            <b><span class="align-middle" th:text="${authUser.getLastName()}"></span></b>
            <b><span class="align-middle" th:text="${authUser.getUserVkId()}"></span></b>
        </p>
        <form th:action="@{/logout}" method="GET" class="mb-0">
            <button type="submit" class="btn btn-dark text-secondary">Logout</button>
        </form>
    </div>
</nav>

<main class="flex-shrink-0">
    <div class="container mt-3">
        <h1 class="m-3 fw-bold">Панель Админа</h1>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <h4 class="mb-0">Пользователи</h4>
                <div class="d-flex align-items-center gap-2">
                    <div class="d-flex align-items-center">
                        <label class="mb-0 me-1">Страница:</label>
                        <input type="number" id="pageInput" class="form-control" style="width: 90px" value="0" min="0">
                    </div>
                    <div class="d-flex align-items-center">
                        <label class="mb-0 me-1">Размер:</label>
                        <input type="number" id="sizeInput" class="form-control" style="width: 90px" value="20" min="1" max="100">
                    </div>
                    <div class="btn-group">
                        <button id="prevPageBtn" class="btn btn-outline-secondary" aria-label="Предыдущая страница">‹</button>
                        <button id="loadUsersBtn" class="btn btn-primary">Загрузить</button>
                        <button id="nextPageBtn" class="btn btn-outline-secondary" aria-label="Следующая страница">›</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle" id="usersTable">
                        <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Фото</th>
                            <th scope="col">Возраст</th>
                            <th scope="col">Имя</th>
                            <th scope="col">Фамилия</th>
                            <th scope="col">Роли</th>
                            <th scope="col">Статус</th>
                            <th scope="col">Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
                <div id="loadingSpinner" class="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                </div>
                <div id="usersEmpty" class="text-muted" style="display: none;">Пользователи не найдены.</div>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="banModal" tabindex="-1" aria-labelledby="banModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="banModalLabel">Подтверждение действия</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="banModalText"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-danger" id="banModalConfirmBtn">Подтвердить</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_API_BASE = '/api/v1/admin';
    const USERS_URL = `${ADMIN_API_BASE}/users`;

    const usersTableBody = document.querySelector('#usersTable tbody');
    const usersEmpty = document.getElementById('usersEmpty');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const pageInput = document.getElementById('pageInput');
    const sizeInput = document.getElementById('sizeInput');
    const loadUsersBtn = document.getElementById('loadUsersBtn');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');

    const banModalEl = document.getElementById('banModal');
    const banModalText = document.getElementById('banModalText');
    const banModalConfirmBtn = document.getElementById('banModalConfirmBtn');
    const banModal = (window.bootstrap && banModalEl)
        ? new bootstrap.Modal(banModalEl)
        : null;

    let pendingAction = null;

    function showError(message) {
        alert(message);
    }

    function calculateAge(birthdayDate) {
        if (!birthdayDate) return null;
        const parts = birthdayDate.split(/[.:-]/);
        if (parts.length < 3) return null;
        const day = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        const year = parseInt(parts[2], 10);
        if (isNaN(day) || isNaN(month) || isNaN(year)) return null;

        const today = new Date();
        let age = today.getFullYear() - year;
        const birthdayThisYear = new Date(today.getFullYear(), month, day);
        if (today < birthdayThisYear) age--;
        return (age >= 0 && age <= 120) ? age : null;
    }

    function createTextCell(text) {
        const td = document.createElement('td');
        td.textContent = text || '';
        return td;
    }

    function renderUsers(users) {
        console.log('renderUsers called with', users);
        usersTableBody.innerHTML = '';
        if (!users || users.length === 0) {
            usersEmpty.style.display = 'block';
            return;
        }
        usersEmpty.style.display = 'none';

        users.forEach(user => {
            const tr = document.createElement('tr');
            const userId = user.userVkId ?? user.vkid ?? user.id;
            const isBanned = user.banned === true || user.locked === true || user.enabled === false;

            const idCell = document.createElement('td');
            if (userId != null) {
                const link = document.createElement('a');
                link.href = `/admin/${userId}`;
                link.textContent = userId;
                link.target = '_blank';
                idCell.appendChild(link);
            }
            tr.appendChild(idCell);

            const photoCell = document.createElement('td');
            if (user.photoBig) {
                const zoomDiv = document.createElement('div');
                zoomDiv.className = 'image-zoom';
                const img = document.createElement('img');
                img.src = user.photoBig;
                img.alt = 'аватарка';
                img.className = 'small-image';
                img.loading = 'lazy';
                zoomDiv.appendChild(img);
                photoCell.appendChild(zoomDiv);
            }
            tr.appendChild(photoCell);

            const age = calculateAge(user.birthdayDate);
            tr.appendChild(createTextCell(age !== null ? age : '-'));

            tr.appendChild(createTextCell(user.firstName));
            tr.appendChild(createTextCell(user.lastName));

            let rolesText = '';
            if (Array.isArray(user.roles)) {
                rolesText = user.roles.map(r => r.name || r.roleName || r.authority || r.toString()).join(', ');
            } else if (user.roles) {
                rolesText = String(user.roles);
            }
            tr.appendChild(createTextCell(rolesText));

            const statusCell = document.createElement('td');
            statusCell.innerHTML = isBanned
                ? '<span class="badge bg-danger">Заблокирован</span>'
                : '<span class="badge bg-success">Активен</span>';
            tr.appendChild(statusCell);

            const actionCell = document.createElement('td');
            const btn = document.createElement('button');
            btn.className = `btn btn-sm ${isBanned ? 'btn-success' : 'btn-danger'}`;
            btn.textContent = isBanned ? 'Разблокировать' : 'Заблокировать';
            btn.dataset.userId = userId;
            btn.dataset.action = isBanned ? 'unban' : 'ban';
            actionCell.appendChild(btn);
            tr.appendChild(actionCell);

            usersTableBody.appendChild(tr);
        });
    }

    async function loadUsers() {
        console.log('loadUsers called');
        let page = parseInt(pageInput.value, 10);
        let size = parseInt(sizeInput.value, 10);
        if (isNaN(page) || page < 0) page = 0;
        if (isNaN(size) || size < 1) size = 20;
        if (size > 100) size = 100;
        pageInput.value = page;
        sizeInput.value = size;

        const url = `${USERS_URL}?page=${page}&size=${size}`;
        console.log('Fetching', url);
        loadingSpinner.style.display = 'block';
        usersEmpty.style.display = 'none';
        usersTableBody.innerHTML = '';

        try {
            const response = await fetch(url, {
                headers: { 'Accept': 'application/json' }
            });
            console.log('Response status', response.status);
            if (!response.ok) {
                throw new Error(`Ошибка загрузки: ${response.status}`);
            }
            const users = await response.json();
            renderUsers(users);
        } catch (err) {
            console.error(err);
            showError('Не удалось загрузить пользователей. Подробности в консоли.');
            usersEmpty.style.display = 'block';
            usersEmpty.textContent = 'Ошибка загрузки.';
        } finally {
            loadingSpinner.style.display = 'none';
        }
    }

    async function performAction(userId, action) {
        const url = `${ADMIN_API_BASE}/users/${userId}/${action === 'ban' ? 'ban' : 'unban'}`;
        try {
            const response = await fetch(url, {
                method: 'PATCH',
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            if (!response.ok) {
                throw new Error(`Ошибка: ${response.status}`);
            }
            await loadUsers();
        } catch (err) {
            console.error(err);
            showError(`Не удалось ${action === 'ban' ? 'заблокировать' : 'разблокировать'} пользователя.`);
        }
    }

    usersTableBody.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const userId = btn.dataset.userId;
        const action = btn.dataset.action;
        if (!userId || !action) return;

        pendingAction = { userId, action };
        if (banModal) {
            banModalText.textContent = action === 'ban'
                ? `Вы действительно хотите заблокировать пользователя ID = ${userId}?`
                : `Вы действительно хотите разблокировать пользователя ID = ${userId}?`;
            banModal.show();
        } else {
            if (confirm(action === 'ban'
                ? `Заблокировать пользователя ID = ${userId}?`
                : `Разблокировать пользователя ID = ${userId}?`)) {
                performAction(userId, action);
            }
        }
    });

    if (banModalConfirmBtn && banModal) {
        banModalConfirmBtn.addEventListener('click', async () => {
            if (!pendingAction) return;
            const { userId, action } = pendingAction;
            banModal.hide();
            await performAction(userId, action);
            pendingAction = null;
        });
    }

    function changePage(delta) {
        let newPage = parseInt(pageInput.value, 10) + delta;
        if (isNaN(newPage)) newPage = 0;
        if (newPage < 0) newPage = 0;
        pageInput.value = newPage;
        loadUsers();
    }

    prevPageBtn.addEventListener('click', () => changePage(-1));
    nextPageBtn.addEventListener('click', () => changePage(1));
    loadUsersBtn.addEventListener('click', (e) => {
        e.preventDefault();
        loadUsers();
    });

    // Вызов сразу после загрузки скрипта (скрипт внизу, DOM уже есть)
    loadUsers();
</script>
</body>
</html>
