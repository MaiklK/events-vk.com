spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/event_vk
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
    parameters:
      BOOTSTRAP_ADMIN_VK_ID: ${BOOTSTRAP_ADMIN_VK_ID:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          vkontakte:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope: offline
            client-name: VKontakte
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
        provider:
          vkontakte:
            authorization-uri: https://oauth.vk.com/authorize?v=5.199
            token-uri: https://oauth.vk.com/access_token
            user-info-uri: https://api.vk.com/method/users.get?v=5.199&fields=first_name,last_name
            user-name-attribute: response

security:
  jwt:
    secret: ${JWT_SECRET_BASE64}
    expiration-seconds: 3600

server:
  port: 80

logging:
  level:
    root: DEBUG
    javax.management.remote.rmi: WARN
    sun.rmi.transport.tcp: WARN
    sun.rmi.loader: WARN
    jdk.event.security: WARN
    org.thymeleaf.TemplateEngine: WARN
    com.zaxxer.hikari.pool.HikariPool: WARN