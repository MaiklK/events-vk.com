version:  '4.22'
services:
  postgres:
    image: postgres:15
    container_name: postgres_vk_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
     POSTGRES_DB: event_vk
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
     POSTGRES_USER: ${POSTGRES_USERNAME}
     PGDATA: /var/lib/postgresql/data
     restart: always

